<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-Learning 可视化训练</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .cell {
            transition: all 0.3s ease;
        }
        .cell:hover {
            transform: scale(1.05);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-secondary {
            background: white;
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            border-color: #667eea;
            color: #667eea;
        }
        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 320px;
        }
        .grid-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            position: relative;
        }
        .agent {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .arrow {
            font-size: 1.5rem;
        }
        .update-log {
            max-height: 200px;
            overflow-y: auto;
        }
        .update-log::-webkit-scrollbar {
            width: 6px;
        }
        .update-log::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen p-4">
    <!-- Header -->
    <header class="max-w-7xl mx-auto mb-6">
        <div class="glass rounded-2xl p-6 shadow-lg">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">Q-Learning 可视化训练</h1>
            <p class="text-slate-600">实时观察智能体学习过程，理解强化学习原理</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Left Panel: Grid World -->
        <section class="lg:col-span-1 space-y-4">
            <!-- Grid World -->
            <div class="glass rounded-2xl p-6 shadow-lg">
                <h2 class="text-lg font-semibold text-slate-700 mb-4 flex items-center">
                    <span class="w-2 h-2 bg-indigo-500 rounded-full mr-2"></span>
                    网格世界
                </h2>
                <div class="grid-container mx-auto" id="gridWorld">
                    <!-- Generated by JS -->
                </div>
                <div class="flex justify-center gap-4 mt-4 text-sm">
                    <span class="flex items-center"><span class="w-3 h-3 bg-blue-300 rounded mr-1"></span>起点</span>
                    <span class="flex items-center"><span class="w-3 h-3 bg-green-300 rounded mr-1"></span>终点</span>
                    <span class="flex items-center"><span class="w-3 h-3 bg-red-300 rounded mr-1"></span>陷阱</span>
                </div>
            </div>

            <!-- Policy Map -->
            <div class="glass rounded-2xl p-6 shadow-lg">
                <h2 class="text-lg font-semibold text-slate-700 mb-4 flex items-center">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full mr-2"></span>
                    当前策略
                </h2>
                <div class="grid-container mx-auto" id="policyMap">
                    <!-- Generated by JS -->
                </div>
            </div>
        </section>

        <!-- Middle Panel: Q-Table & Formula -->
        <section class="lg:col-span-1 space-y-4">
            <!-- Q-Table -->
            <div class="glass rounded-2xl p-6 shadow-lg">
                <h2 class="text-lg font-semibold text-slate-700 mb-4 flex items-center">
                    <span class="w-2 h-2 bg-amber-500 rounded-full mr-2"></span>
                    Q值表
                </h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm" id="qTable">
                        <thead>
                            <tr class="text-slate-500 border-b">
                                <th class="text-left py-2">状态</th>
                                <th class="text-center">上</th>
                                <th class="text-center">下</th>
                                <th class="text-center">左</th>
                                <th class="text-center">右</th>
                                <th class="text-center">最大</th>
                            </tr>
                        </thead>
                        <tbody id="qTableBody">
                            <!-- Generated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Formula -->
            <div class="glass rounded-2xl p-6 shadow-lg">
                <h2 class="text-lg font-semibold text-slate-700 mb-4 flex items-center">
                    <span class="w-2 h-2 bg-purple-500 rounded-full mr-2"></span>
                    Q-Learning 公式
                </h2>
                <div class="bg-slate-800 rounded-xl p-4 text-white font-mono text-sm mb-4">
                    <div class="text-emerald-400">Q(s,a) = Q(s,a) + α × [r + γ×maxQ(s',a') - Q(s,a)]</div>
                </div>
                
                <!-- Current Update -->
                <div id="currentUpdate" class="bg-gradient-to-r from-indigo-50 to-purple-50 rounded-xl p-4 border border-indigo-100">
                    <div class="text-sm text-slate-600 mb-2">当前更新</div>
                    <div class="font-mono text-sm space-y-1" id="updateDetails">
                        <div class="text-slate-400">等待开始训练...</div>
                    </div>
                </div>
            </div>

            <!-- Update Log -->
            <div class="glass rounded-2xl p-6 shadow-lg">
                <h2 class="text-lg font-semibold text-slate-700 mb-4">更新日志</h2>
                <div class="update-log text-sm font-mono space-y-1" id="updateLog">
                    <div class="text-slate-400">点击"开始训练"查看更新...</div>
                </div>
            </div>
        </section>

        <!-- Right Panel: Stats & Charts -->
        <section class="lg:col-span-1 space-y-4">
            <!-- Statistics -->
            <div class="glass rounded-2xl p-6 shadow-lg">
                <h2 class="text-lg font-semibold text-slate-700 mb-4 flex items-center">
                    <span class="w-2 h-2 bg-rose-500 rounded-full mr-2"></span>
                    训练统计
                </h2>
                <div class="grid grid-cols-2 gap-3">
                    <div class="stat-card rounded-xl p-3">
                        <div class="text-xs text-slate-500">回合数</div>
                        <div class="text-2xl font-bold text-slate-700" id="statEpisode">0</div>
                    </div>
                    <div class="stat-card rounded-xl p-3">
                        <div class="text-xs text-slate-500">步数</div>
                        <div class="text-2xl font-bold text-slate-700" id="statStep">0</div>
                    </div>
                    <div class="stat-card rounded-xl p-3">
                        <div class="text-xs text-slate-500">当前奖励</div>
                        <div class="text-2xl font-bold" id="statReward">0</div>
                    </div>
                    <div class="stat-card rounded-xl p-3">
                        <div class="text-xs text-slate-500">探索率 ε</div>
                        <div class="text-2xl font-bold text-indigo-600" id="statEpsilon">1.0</div>
                    </div>
                </div>
            </div>

            <!-- Charts -->
            <div class="glass rounded-2xl p-6 shadow-lg">
                <h2 class="text-lg font-semibold text-slate-700 mb-4">训练曲线</h2>
                <div id="rewardChart" class="h-48 mb-4"></div>
                <div id="stepChart" class="h-48 mb-4"></div>
                <div id="epsilonChart" class="h-48"></div>
            </div>
        </section>
    </main>

    <!-- Control Bar -->
    <div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 glass rounded-2xl shadow-2xl p-4 flex items-center gap-4 z-50">
        <button onclick="toggleTraining()" id="btnToggle" class="btn-primary text-white px-6 py-2 rounded-xl font-medium">
            开始训练
        </button>
        <button onclick="stepOnce()" class="btn-secondary px-4 py-2 rounded-xl font-medium text-slate-700">
            单步
        </button>
        <button onclick="resetTraining()" class="btn-secondary px-4 py-2 rounded-xl font-medium text-slate-700">
            重置
        </button>
        <div class="h-8 w-px bg-slate-300 mx-2"></div>
        <input type="number" id="batchInput" value="100" min="1" max="1000" 
               class="w-20 px-3 py-2 rounded-xl border-2 border-slate-200 focus:border-indigo-500 outline-none text-center font-medium">
        <button onclick="trainBatch()" class="btn-secondary px-4 py-2 rounded-xl font-medium text-slate-700">
            训练 N 轮
        </button>
        <div class="flex items-center gap-2 ml-2">
            <span class="text-sm text-slate-500">速度:</span>
            <select id="speedSelect" class="px-2 py-1 rounded-lg border border-slate-200 text-sm">
                <option value="500">慢</option>
                <option value="200" selected>中</option>
                <option value="50">快</option>
                <option value="0">极速</option>
            </select>
        </div>
    </div>

    <script>
        // Q-Learning Implementation
        class GridWorldEnv {
            constructor(size = 4) {
                this.size = size;
                this.startPos = [0, 0];
                this.goalPos = [3, 3];
                this.traps = [[1, 1], [2, 2]];
                this.reset();
            }
            
            reset() {
                this.currentPos = [...this.startPos];
                this.steps = 0;
                return this.getState();
            }
            
            getState() {
                return this.currentPos[0] * this.size + this.currentPos[1];
            }
            
            step(action) {
                this.steps++;
                let [row, col] = this.currentPos;
                
                // Actions: 0=up, 1=down, 2=left, 3=right
                if (action === 0) row = Math.max(0, row - 1);
                else if (action === 1) row = Math.min(this.size - 1, row + 1);
                else if (action === 2) col = Math.max(0, col - 1);
                else if (action === 3) col = Math.min(this.size - 1, col + 1);
                
                this.currentPos = [row, col];
                
                let reward = -1;
                let done = false;
                
                if (this.currentPos[0] === this.goalPos[0] && this.currentPos[1] === this.goalPos[1]) {
                    reward = 10;
                    done = true;
                } else if (this.traps.some(t => t[0] === this.currentPos[0] && t[1] === this.currentPos[1])) {
                    reward = -10;
                    done = true;
                } else if (this.steps >= 100) {
                    done = true;
                }
                
                return { state: this.getState(), reward, done };
            }
        }

        class QLearningAgent {
            constructor(nStates, nActions) {
                this.nStates = nStates;
                this.nActions = nActions;
                this.lr = 0.1;
                this.gamma = 0.99;
                this.epsilon = 1.0;
                this.epsilonDecay = 0.995;
                this.epsilonMin = 0.01;
                this.qTable = Array(nStates).fill(null).map(() => Array(nActions).fill(0));
                this.trainingStep = 0;
            }
            
            chooseAction(state, training = true) {
                if (training && Math.random() < this.epsilon) {
                    return Math.floor(Math.random() * this.nActions);
                }
                const qValues = this.qTable[state];
                return qValues.indexOf(Math.max(...qValues));
            }
            
            learn(state, action, reward, nextState, done) {
                const currentQ = this.qTable[state][action];
                let target;
                if (done) {
                    target = reward;
                } else {
                    const maxNextQ = Math.max(...this.qTable[nextState]);
                    target = reward + this.gamma * maxNextQ;
                }
                
                const tdError = target - currentQ;
                this.qTable[state][action] += this.lr * tdError;
                this.trainingStep++;
                
                return { oldQ: currentQ, newQ: this.qTable[state][action], target, tdError };
            }
            
            updateEpsilon() {
                this.epsilon = Math.max(this.epsilonMin, this.epsilon * this.epsilonDecay);
            }
        }

        // Global variables
        let env = new GridWorldEnv();
        let agent = new QLearningAgent(16, 4);
        let isTraining = false;
        let trainingInterval = null;
        let episode = 0;
        let episodeReward = 0;
        let episodeStep = 0;
        let episodeRewards = [];
        let episodeSteps = [];
        let epsilonHistory = [];

        // Initialize UI
        function init() {
            renderGrid();
            renderPolicy();
            renderQTable();
            initCharts();
            updateStats();
        }

        function renderGrid() {
            const container = document.getElementById('gridWorld');
            container.innerHTML = '';
            
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell shadow-md';
                    
                    const isGoal = i === env.goalPos[0] && j === env.goalPos[1];
                    const isTrap = env.traps.some(t => t[0] === i && t[1] === j);
                    const isStart = i === env.startPos[0] && j === env.startPos[1];
                    const isAgent = env.currentPos[0] === i && env.currentPos[1] === j;
                    
                    if (isGoal) {
                        cell.className += ' bg-green-300 text-green-800';
                        cell.textContent = 'G';
                    } else if (isTrap) {
                        cell.className += ' bg-red-300 text-red-800';
                        cell.textContent = 'X';
                    } else if (isStart) {
                        cell.className += ' bg-blue-300 text-blue-800';
                        cell.textContent = 'S';
                    } else {
                        cell.className += ' bg-white text-slate-400';
                        cell.textContent = i * 4 + j;
                    }
                    
                    if (isAgent) {
                        const agent = document.createElement('div');
                        agent.className = 'absolute w-6 h-6 bg-amber-400 rounded-full border-2 border-amber-600 agent flex items-center justify-center text-xs font-bold text-amber-800';
                        agent.textContent = 'A';
                        cell.style.position = 'relative';
                        cell.appendChild(agent);
                    }
                    
                    container.appendChild(cell);
                }
            }
        }

        function renderPolicy() {
            const container = document.getElementById('policyMap');
            container.innerHTML = '';
            const arrows = ['↑', '↓', '←', '→'];
            
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell shadow-md';
                    
                    const isGoal = i === env.goalPos[0] && j === env.goalPos[1];
                    const isTrap = env.traps.some(t => t[0] === i && t[1] === j);
                    
                    if (isGoal) {
                        cell.className += ' bg-green-300 text-green-800';
                        cell.textContent = 'G';
                    } else if (isTrap) {
                        cell.className += ' bg-red-300 text-red-800';
                        cell.textContent = 'X';
                    } else {
                        const state = i * 4 + j;
                        const qValues = agent.qTable[state];
                        const bestAction = qValues.indexOf(Math.max(...qValues));
                        const maxQ = Math.max(...qValues);
                        
                        // Color based on Q value
                        let bgClass = 'bg-white';
                        if (maxQ > 0) bgClass = 'bg-green-50';
                        else if (maxQ < 0) bgClass = 'bg-red-50';
                        
                        cell.className += ` ${bgClass} text-slate-700`;
                        cell.innerHTML = `<span class="arrow">${arrows[bestAction]}</span>`;
                    }
                    
                    container.appendChild(cell);
                }
            }
        }

        function renderQTable() {
            const tbody = document.getElementById('qTableBody');
            tbody.innerHTML = '';
            
            for (let i = 0; i < 16; i++) {
                const row = document.createElement('tr');
                row.className = 'border-b border-slate-100 hover:bg-slate-50';
                
                const pos = [Math.floor(i / 4), i % 4];
                const isGoal = pos[0] === env.goalPos[0] && pos[1] === env.goalPos[1];
                const isTrap = env.traps.some(t => t[0] === pos[0] && t[1] === pos[1]);
                const isCurrent = env.getState() === i;
                
                let marker = '';
                if (isGoal) marker = ' G';
                else if (isTrap) marker = ' X';
                else if (isCurrent) marker = ' *';
                
                const qValues = agent.qTable[i];
                const maxQ = Math.max(...qValues);
                
                row.innerHTML = `
                    <td class="py-2 font-medium ${isCurrent ? 'text-indigo-600 font-bold' : 'text-slate-600'}">${i}${marker}</td>
                    ${qValues.map((q, idx) => {
                        const isMax = q === maxQ && q !== 0;
                        return `<td class="text-center ${isMax ? 'bg-emerald-100 text-emerald-700 font-semibold rounded' : 'text-slate-500'}">${q.toFixed(2)}</td>`;
                    }).join('')}
                    <td class="text-center font-bold ${maxQ > 0 ? 'text-green-600' : maxQ < 0 ? 'text-red-600' : 'text-slate-400'}">${maxQ.toFixed(2)}</td>
                `;
                
                tbody.appendChild(row);
            }
        }

        function initCharts() {
            const layout = {
                margin: { t: 20, r: 20, b: 40, l: 40 },
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { family: 'Inter, sans-serif' }
            };
            
            Plotly.newPlot('rewardChart', [{
                x: [], y: [], mode: 'lines',
                line: { color: '#667eea', width: 2 },
                fill: 'tozeroy', fillcolor: 'rgba(102, 126, 234, 0.1)'
            }], {...layout, yaxis: { title: 'Reward' }}, {responsive: true, displayModeBar: false});
            
            Plotly.newPlot('stepChart', [{
                x: [], y: [], mode: 'lines',
                line: { color: '#10b981', width: 2 },
                fill: 'tozeroy', fillcolor: 'rgba(16, 185, 129, 0.1)'
            }], {...layout, yaxis: { title: 'Steps' }}, {responsive: true, displayModeBar: false});
            
            Plotly.newPlot('epsilonChart', [{
                x: [], y: [], mode: 'lines',
                line: { color: '#8b5cf6', width: 2 }
            }], {...layout, yaxis: { title: 'Epsilon' }}, {responsive: true, displayModeBar: false});
        }

        function updateCharts() {
            const x = Array.from({length: episodeRewards.length}, (_, i) => i);
            
            Plotly.react('rewardChart', [{
                x, y: episodeRewards, mode: 'lines',
                line: { color: '#667eea', width: 2 },
                fill: 'tozeroy', fillcolor: 'rgba(102, 126, 234, 0.1)'
            }], {margin: { t: 20, r: 20, b: 40, l: 40 }, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)'});
            
            Plotly.react('stepChart', [{
                x, y: episodeSteps, mode: 'lines',
                line: { color: '#10b981', width: 2 },
                fill: 'tozeroy', fillcolor: 'rgba(16, 185, 129, 0.1)'
            }], {margin: { t: 20, r: 20, b: 40, l: 40 }, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)'});
            
            Plotly.react('epsilonChart', [{
                x, y: epsilonHistory, mode: 'lines',
                line: { color: '#8b5cf6', width: 2 }
            }], {margin: { t: 20, r: 20, b: 40, l: 40 }, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)'});
        }

        function updateStats() {
            document.getElementById('statEpisode').textContent = episode;
            document.getElementById('statStep').textContent = episodeStep;
            document.getElementById('statReward').textContent = episodeReward.toFixed(1);
            document.getElementById('statReward').className = `text-2xl font-bold ${episodeReward > 0 ? 'text-green-600' : episodeReward < 0 ? 'text-red-600' : 'text-slate-700'}`;
            document.getElementById('statEpsilon').textContent = agent.epsilon.toFixed(3);
        }

        function updateUpdateDetail(info, state, action, nextState, reward) {
            const actions = ['Up', 'Down', 'Left', 'Right'];
            const html = `
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div><span class="text-slate-500">State:</span> ${state} → ${nextState}</div>
                    <div><span class="text-slate-500">Action:</span> ${actions[action]}</div>
                    <div><span class="text-slate-500">Reward:</span> <span class="${reward > 0 ? 'text-green-600' : reward < 0 ? 'text-red-600' : ''}">${reward.toFixed(2)}</span></div>
                    <div><span class="text-slate-500">Old Q:</span> ${info.oldQ.toFixed(3)}</div>
                    <div><span class="text-slate-500">New Q:</span> <span class="font-semibold text-indigo-600">${info.newQ.toFixed(3)}</span></div>
                    <div><span class="text-slate-500">TD Error:</span> ${info.tdError > 0 ? '+' : ''}${info.tdError.toFixed(3)}</div>
                </div>
            `;
            document.getElementById('updateDetails').innerHTML = html;
            
            // Add to log
            const log = document.getElementById('updateLog');
            const logEntry = document.createElement('div');
            logEntry.className = 'text-xs py-1 border-b border-slate-100';
            logEntry.innerHTML = `<span class="text-slate-400">${episode}-${episodeStep}:</span> s=${state} a=${actions[action]} r=${reward.toFixed(1)} Q:${info.oldQ.toFixed(2)}→${info.newQ.toFixed(2)}`;
            log.insertBefore(logEntry, log.firstChild);
            if (log.children.length > 50) log.removeChild(log.lastChild);
        }

        function stepOnce() {
            const state = env.getState();
            const action = agent.chooseAction(state, true);
            const result = env.step(action);
            const learnInfo = agent.learn(state, action, result.reward, result.state, result.done);
            
            episodeReward += result.reward;
            episodeStep++;
            
            updateUpdateDetail(learnInfo, state, action, result.state, result.reward);
            
            if (result.done) {
                agent.updateEpsilon();
                episodeRewards.push(episodeReward);
                episodeSteps.push(episodeStep);
                epsilonHistory.push(agent.epsilon);
                episode++;
                
                env.reset();
                episodeReward = 0;
                episodeStep = 0;
                updateCharts();
            }
            
            renderGrid();
            renderPolicy();
            renderQTable();
            updateStats();
        }

        function toggleTraining() {
            const btn = document.getElementById('btnToggle');
            if (isTraining) {
                isTraining = false;
                clearInterval(trainingInterval);
                btn.textContent = '开始训练';
                btn.className = 'btn-primary text-white px-6 py-2 rounded-xl font-medium';
            } else {
                isTraining = true;
                btn.textContent = '暂停训练';
                btn.className = 'btn-secondary px-6 py-2 rounded-xl font-medium text-slate-700 border-amber-400 text-amber-600';
                const speed = parseInt(document.getElementById('speedSelect').value);
                trainingInterval = setInterval(stepOnce, speed);
            }
        }

        function resetTraining() {
            if (isTraining) toggleTraining();
            env = new GridWorldEnv();
            agent = new QLearningAgent(16, 4);
            episode = 0;
            episodeReward = 0;
            episodeStep = 0;
            episodeRewards = [];
            episodeSteps = [];
            epsilonHistory = [];
            document.getElementById('updateLog').innerHTML = '<div class="text-slate-400">训练已重置...</div>';
            init();
        }

        function trainBatch() {
            const n = parseInt(document.getElementById('batchInput').value) || 100;
            const speed = parseInt(document.getElementById('speedSelect').value);
            
            if (isTraining) toggleTraining();
            
            let count = 0;
            const batchInterval = setInterval(() => {
                stepOnce();
                count++;
                if (count >= n || count > 1000) {
                    clearInterval(batchInterval);
                }
            }, Math.max(speed / 5, 10));
        }

        // Initialize
        init();
    </script>
</body>
</html>
